<!DOCTYPE html>
<html>
<head>
<title>Stock Analyzer Pro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    margin:0;
    background:#020617;
    color:#e2e8f0;
    transition:0.4s;
}

/* LIGHT MODE */
.light {
    background:#f1f5f9;
    color:black;
}

/* HEADER */
.header {
    padding:20px;
    text-align:center;
    border-bottom:1px solid #1e293b;
}

/* BUTTON */
button {
    padding:10px 15px;
    margin:5px;
    border:none;
    background:#3b82f6;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover {
    background:#2563eb;
}

/* SEARCH */
.search {
    text-align:center;
    padding:20px;
}

/* TABS */
.tabs {
    display:none;
    padding:10px;
    text-align:center;
    border-bottom:1px solid #1e293b;
}

/* CONTENT */
.content {
    display:none;
    padding:20px;
    animation:fade 0.5s;
}

/* ANIMATION */
@keyframes fade {
    from {opacity:0; transform:translateY(10px);}
    to {opacity:1; transform:translateY(0);}
}

/* CARDS */
.card {
    border:1px solid #1e293b;
    padding:20px;
    margin:20px auto;
    max-width:900px;
    border-radius:12px;
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

.box {
    padding:15px;
    border:1px solid #1e293b;
    border-radius:10px;
}

/* TABLE */
table {
    width:100%;
    border-collapse:collapse;
}

th {
    background:#1e293b;
    padding:10px;
}

td {
    padding:10px;
    text-align:center;
    border-bottom:1px solid #1e293b;
}

/* PROS CONS */
.pros { border-left:5px solid green; }
.cons { border-left:5px solid red; }

canvas {
    max-width:900px;
    margin:auto;
    display:block;
}
</style>
</head>

<body id="body">

<div class="header">
<h1>📊 Stock Market Analyzer</h1>
<button onclick="toggleTheme()">🌙 / ☀️</button>
</div>

<!-- SELECT -->
<div class="search" id="searchBox">
<h2>Select Company</h2>
<button onclick="loadCompany('vtm')">VTM</button>
<button onclick="loadCompany('tcs')">TCS</button>
</div>

<!-- TABS -->
<div class="tabs" id="tabs">
<button onclick="openTab('summary')">Summary</button>
<button onclick="openTab('chart')">Charts</button>
<button onclick="openTab('analysis')">Analysis</button>
<button onclick="openTab('pl')">P&L</button>
<button onclick="openTab('balance')">Balance</button>
<button onclick="goBack()">⬅ Back</button>
</div>

<!-- CONTENT -->
<div id="summary" class="content"></div>

<div id="chart" class="content">
<canvas id="priceChart"></canvas><br>
<canvas id="profitChart"></canvas>
</div>

<div id="analysis" class="content"></div>
<div id="pl" class="content"></div>
<div id="balance" class="content"></div>

<script>

let chart1, chart2;

const data = {
vtm: {
name:"VTM Ltd",
price:"₹75.6",
market:"₹761 Cr",
pe:"12.5",
roe:"10%",
chart:[60,80,50,120,75],
sales:[194,209,208,345,371],
profit:[15,9,18,45,22],
assets:["100","150","200","250","394"],
pros:["Good growth","Dividend"],
cons:["Low ROE"]
},

tcs: {
name:"TCS",
price:"₹3800",
market:"₹13L Cr",
pe:"30",
roe:"40%",
chart:[3000,3200,3400,3600,3800],
sales:[100,120,140,160,180],
profit:[30,35,40,45,50],
assets:["5000","6000","7000","8000","10000"],
pros:["Market leader"],
cons:["Slow growth"]
}
};

function loadCompany(company) {

document.getElementById("searchBox").style.display="none";
document.getElementById("tabs").style.display="block";

let c = data[company];

// SUMMARY
document.getElementById("summary").innerHTML = `
<div class="card">
<h2>${c.name}</h2>
<div class="grid">
<div class="box">Price<br><b>${c.price}</b></div>
<div class="box">Market<br><b>${c.market}</b></div>
<div class="box">P/E<br><b>${c.pe}</b></div>
<div class="box">ROE<br><b>${c.roe}</b></div>
</div>
</div>`;

// ANALYSIS
document.getElementById("analysis").innerHTML = `
<div class="card pros"><h3>Pros</h3>${c.pros.map(p=>"<li>"+p+"</li>").join("")}</div>
<div class="card cons"><h3>Cons</h3>${c.cons.map(p=>"<li>"+p+"</li>").join("")}</div>`;

// P&L
document.getElementById("pl").innerHTML = `
<div class="card">
<h3>Profit & Loss</h3>
<table>
<tr><th>Year</th><th>Sales</th><th>Profit</th></tr>
${c.sales.map((s,i)=>`<tr><td>${2021+i}</td><td>${s}</td><td>${c.profit[i]}</td></tr>`).join("")}
</table>
</div>`;

// BALANCE
document.getElementById("balance").innerHTML = `
<div class="card">
<h3>Balance Sheet</h3>
<table>
<tr><th>Year</th><th>Assets</th></tr>
${c.assets.map((a,i)=>`<tr><td>${2021+i}</td><td>${a}</td></tr>`).join("")}
</table>
</div>`;

// CHARTS
if(chart1) chart1.destroy();
if(chart2) chart2.destroy();

chart1 = new Chart(document.getElementById("priceChart"), {
type:"line",
data:{labels:["2021","2022","2023","2024","2025"],
datasets:[{label:"Price",data:c.chart,borderColor:"#3b82f6"}]}
});

chart2 = new Chart(document.getElementById("profitChart"), {
type:"bar",
data:{labels:["2021","2022","2023","2024","2025"],
datasets:[{label:"Profit",data:c.profit,backgroundColor:"#22c55e"}]}
});

openTab("summary");
}

function openTab(tab){
let contents=document.getElementsByClassName("content");
for(let i=0;i<contents.length;i++){
contents[i].style.display="none";
}
document.getElementById(tab).style.display="block";
}

function goBack(){
location.reload();
}

function toggleTheme(){
document.getElementById("body").classList.toggle("light");
}

</script>

</body>
</html>
