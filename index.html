<!DOCTYPE html>
<html>
<head>
<title>Stock Analyzer Pro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    margin:0;
    background:#020617;
    color:white;
}

/* HEADER */
.header {
    text-align:center;
    padding:20px;
    border-bottom:1px solid #333;
}

/* BUTTON */
button {
    padding:10px 15px;
    margin:5px;
    border:none;
    background:#2563eb;
    color:white;
    border-radius:5px;
    cursor:pointer;
}
button:hover { background:#1e40af; }

/* SEARCH */
.search { text-align:center; padding:20px; }

/* TABS */
.tabs {
    display:none;
    text-align:center;
    padding:10px;
    border-bottom:1px solid #333;
}

/* CONTENT */
.content {
    display:none;
    padding:20px;
    animation:fade 0.5s;
}

@keyframes fade {
    from {opacity:0;}
    to {opacity:1;}
}

/* CARD */
.card {
    background:#111;
    padding:20px;
    margin:20px auto;
    max-width:900px;
    border-radius:10px;
}

/* KPI */
.kpi-grid {
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

.kpi {
    background:#020617;
    border:1px solid #333;
    padding:15px;
    border-radius:10px;
    text-align:center;
}

.kpi span {
    color:#22c55e;
    font-weight:bold;
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
    margin-top:20px;
}

/* TABLE */
table {
    width:100%;
    border-collapse:collapse;
}
th, td {
    border:1px solid #333;
    padding:10px;
    text-align:center;
}
th { background:#2563eb; }

/* CHART */
canvas {
    max-width:900px;
    margin:auto;
    display:block;
}
</style>
</head>

<body>

<div class="header">
<h1>📊 Stock Market Analyzer</h1>
</div>

<!-- SELECT -->
<div class="search" id="searchBox">
<h2>Select Company</h2>

<button onclick="loadCompany('vtm')">VTM</button>
<button onclick="loadCompany('tcs')">TCS</button>
